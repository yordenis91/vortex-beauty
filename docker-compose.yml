services:
  backend:
    build: ./backend
    container_name: vortexbeauty_backend # Cambiamos el nombre para que no choque con el original
    restart: always
    ports:
      - "3002:3001"
    environment:
      # host.docker.internal le dice a este contenedor que busque la base de datos en tu máquina host
      # Asegúrate de que el puerto (5432 o 5433) sea el que tu Vortex original tiene expuesto al exterior.
      - DATABASE_URL=postgresql://admin:adminpassword@host.docker.internal:5432/vortexbeauty_db?schema=public
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production
      - PORT=3001 # OJO: El puerto interno del contenedor debe ser 3001 para que el mapeo "3002:3001" funcione
    extra_hosts:
      # Esto es un truco vital para Linux: permite que host.docker.internal funcione correctamente
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - /app/node_modules